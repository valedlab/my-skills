<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    window['ai_edge_gallery_get_result'] = async (data) => {
        try {
            const payload = typeof data === "string" ? JSON.parse(data) : data;
            const action = payload.action;

            let result = "";

            switch (action) {
                case "price":
                    const coins = payload.coins || "bitcoin,ethereum";
                    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins}&vs_currencies=usd,eur&include_24hr_change=true`);
                    const prices = await res.json();
                    
                    result = Object.keys(prices).map(coin => {
                        const p = prices[coin];
                        const change = p.usd_24h_change ? p.usd_24h_change.toFixed(2) : "N/A";
                        return `• \( {coin.toUpperCase()}: \[ {p.usd.toLocaleString()} ( \){change}%)`;
                    }).join("\n");
                    break;

                case "top":
                    const topRes = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1");
                    const top = await topRes.json();
                    result = top.map((c, i) => 
                        `${i+1}. \( {c.symbol.toUpperCase()} — \]{c.current_price.toLocaleString()} ( \){c.price_change_percentage_24h?.toFixed(2)}%)`
                    ).join("\n");
                    break;

                case "market":
                    const marketRes = await fetch("https://api.coingecko.com/api/v3/global");
                    const market = await marketRes.json();
                    const g = market.data;
                    result = `Total Market Cap: \[ {(g.total_market_cap.usd / 1e12).toFixed(2)}T\n` +
                             `24h Volume: \]{(g.total_volume.usd / 1e9).toFixed(1)}B\n` +
                             `BTC Dominance: ${g.market_cap_percentage.btc.toFixed(1)}%`;
                    break;

                default:
                    result = "Try: price (bitcoin), top, or market";
            }

            return JSON.stringify({ result });

        } catch (e) {
            return JSON.stringify({ error: "API Error - Try again in a few seconds." });
        }
    };
</script>
</body>
</html>
