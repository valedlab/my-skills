<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gradient Maker</title>
</head>
<body>
    <script>
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                // Parse input data
                const params = JSON.parse(data);
                
                // Set defaults
                const colors = params.colors || ['#667eea', '#764ba2'];
                const direction = params.direction || 'diagonal';
                const width = params.width || 800;
                const height = params.height || 600;
                const style = params.style || 'solid';
                
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // Generate gradient based on direction
                let gradient;
                
                switch(direction.toLowerCase()) {
                    case 'horizontal':
                        gradient = ctx.createLinearGradient(0, 0, width, 0);
                        break;
                    case 'vertical':
                        gradient = ctx.createLinearGradient(0, 0, 0, height);
                        break;
                    case 'radial':
                        gradient = ctx.createRadialGradient(
                            width / 2, height / 2, 0,
                            width / 2, height / 2, Math.max(width, height) / 2
                        );
                        break;
                    case 'conic':
                        gradient = ctx.createConicGradient(0, width / 2, height / 2);
                        break;
                    case 'diagonal':
                    default:
                        gradient = ctx.createLinearGradient(0, 0, width, height);
                        break;
                }
                
                // Add color stops evenly distributed
                colors.forEach((color, index) => {
                    const stop = index / (colors.length - 1);
                    try {
                        gradient.addColorStop(stop, color);
                    } catch (e) {
                        console.warn(`Invalid color: ${color}, using fallback`);
                        gradient.addColorStop(stop, '#888888');
                    }
                });
                
                // Fill canvas with gradient
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                
                // Apply style effects
                if (style === 'blur') {
                    applyBlurEffect(ctx, width, height);
                } else if (style === 'noise') {
                    applyNoiseEffect(ctx, width, height);
                }
                
                // Convert to base64
                const base64 = canvas.toDataURL('image/png').split(',')[1];
                
                // Return result with image
                return JSON.stringify({
                    result: `✨ Generated ${direction} gradient with colors: ${colors.join(', ')}. Size: ${width}x${height}px`,
                    image: {
                        base64: base64,
                        altText: `${direction} gradient with ${colors.length} colors`
                    }
                });
                
            } catch (e) {
                console.error('Error generating gradient:', e);
                return JSON.stringify({
                    error: `Failed to generate gradient: ${e.message}`
                });
            }
        };
        
        function applyBlurEffect(ctx, width, height) {
            // Add subtle overlay for softer look
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            // Simple box blur approximation
            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * 10;
                data[i] = Math.min(255, Math.max(0, data[i] + noise));
                data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise));
                data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise));
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
        
        function applyNoiseEffect(ctx, width, height) {
            // Add subtle noise texture
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * 20;
                data[i] = Math.min(255, Math.max(0, data[i] + noise));
                data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise));
                data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise));
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
    </script>
</body>
