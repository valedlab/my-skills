<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gradient Maker</title>
</head>
<body>
    <script>
        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const params = JSON.parse(data);
                const colors = params.colors || ['#667eea', '#764ba2'];
                const direction = params.direction || 'diagonal';
                const width = Math.min(params.width || 400, 800);
                const height = Math.min(params.height || 300, 600);
                
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                let gradient;
                if (direction === 'horizontal') gradient = ctx.createLinearGradient(0, 0, width, 0);
                else if (direction === 'vertical') gradient = ctx.createLinearGradient(0, 0, 0, height);
                else if (direction === 'radial') gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width,height)/2);
                else gradient = ctx.createLinearGradient(0, 0, width, height);
                
                colors.forEach((color, i) => {
                    try { gradient.addColorStop(i / (colors.length - 1), color); }
                    catch(e) { gradient.addColorStop(i / (colors.length - 1), '#888888'); }
                });
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                
                const base64 = canvas.toDataURL('image/png').split(',')[1];
                
                return JSON.stringify({
                    result: `Generated ${direction} gradient`,
                    image: { base64: base64 }
                });
            } catch (e) {
                return JSON.stringify({ error: e.message });
            }
        };
    </script>
</body>
</html>
