<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
window.ai_edge_gallery_get_result = async function(llmOutput) {
  try {
    const match = llmOutput.match(/\{[\s\S]*\}/);
    if (!match) return "❌ Could not parse tier list data.";
    const data = JSON.parse(match[0]);

    const tierConfig = {
      S: { emoji: "👑", bar: "██████████" },
      A: { emoji: "🔥", bar: "████████░░" },
      B: { emoji: "✅", bar: "██████░░░░" },
      C: { emoji: "😐", bar: "████░░░░░░" },
      D: { emoji: "👎", bar: "██░░░░░░░░" },
      F: { emoji: "💀", bar: "░░░░░░░░░░" },
    };

    // Group items by tier
    const tiers = { S: [], A: [], B: [], C: [], D: [], F: [] };
    data.items.forEach(item => {
      if (tiers[item.tier]) tiers[item.tier].push(item.name);
    });

    let output = `🏆 ${data.topic.toUpperCase()} TIER LIST\n`;
    output += "━━━━━━━━━━━━━━━━━━━━━━\n\n";

    for (const [tier, cfg] of Object.entries(tierConfig)) {
      const items = tiers[tier];
      if (items.length === 0) continue;
      output += `${cfg.emoji} ${tier}-TIER\n`;
      output += `${cfg.bar}\n`;
      items.forEach(item => {
        output += `  • ${item}\n`;
      });
      output += "\n";
    }

    output += "━━━━━━━━━━━━━━━━━━━━━━\n";
    output += "💬 Disagree? Tell me what to change!";

    return output;

  } catch (e) {
    return "❌ Error building tier list: " + e.message;
  }
};
</script>
</body>
</html>
