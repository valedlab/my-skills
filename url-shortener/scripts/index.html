<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
<script>
    window['ai_edge_gallery_get_result'] = async (data) => {
        try {
            const payload = typeof data === "string" ? JSON.parse(data) : data;
            const action = payload.action || "shorten";

            let result = "";
            let image = null;

            // More flexible parameter handling
            const url = payload.url || payload.text || payload.input;

            switch (action) {
                case "shorten":
                    if (!url) return JSON.stringify({ error: "No URL provided" });
                    const shortRes = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
                    const shortData = await shortRes.json();
                    result = `✅ Shortened URL:\n${shortData.shorturl}`;
                    break;

                case "qr":
                case "shorten-qr":
                    if (!url) return JSON.stringify({ error: "No text or URL provided" });
                    if (action === "shorten-qr") {
                        const sRes = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
                        const sData = await sRes.json();
                        result = `✅ Short URL: ${sData.shorturl}\n\nQR Code:`;
                    } else {
                        result = `✅ QR Code for: ${url}`;
                    }
                    image = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(url)}`;
                    break;

                default:
                    result = "Try: shorten [url] or qr [text]";
            }

            return JSON.stringify({ result, image });

        } catch (e) {
            return JSON.stringify({ error: "Failed to shorten URL. Try again." });
        }
    };
</script>
</body>
